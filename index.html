<meta charset="UTF-8">

<title>MISIA 星空のライヴ XIII 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #ffd966;
    --gold-bright: #ffe799;
    --red: #ff5c5c;
    --green-hdr: #1a3d2e;
    --cell-bg: rgba(255,255,255,0.04);
    --cell-bd: rgba(255,255,255,0.12);
    --evt-bg: rgba(15,35,95,0.92);
    --evt-bd: rgba(130,190,255,0.5);
  }
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: auto;
  }
  
  
  
  
  
  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    margin: 0 auto;
    padding: 12px 10px 30px;
  }
  
  /* ★★★ タイトル「2026年✦」のフォント変更箇所 ★★★
     Google Fonts のフォント名を下の font-family に入れてください
     例: font-family: 'Noto Serif JP', serif;
     フォント追加は上の <link href="https://fonts.googleapis.com/..."> も変更が必要です */
  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 6vw, 68px);
    font-weight: 900;
    background: linear-gradient(135deg, #ffe066 0%, #ffd700 50%, #ffed99 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 8px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
  }
  
  .t-star {
    font-size: clamp(22px, 4vw, 48px);
    color: #ffd700;
    filter: drop-shadow(0 0 12px #ffd700);
  }
  
  /* ★★★ サブタイトル「MISIA 星空のライヴ XIII」のフォント変更箇所 ★★★ */
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(14px, 2.5vw, 32px);
    font-weight: 600;
    color: rgba(220,235,255,0.95);
    letter-spacing: 5px;
    margin-bottom: 30px;
    text-shadow: 0 0 20px rgba(180,210,255,0.5);
    font-style: italic;
  }
  
  /* ═══ Layout ═══ */
  .row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    margin-bottom: 22px;
  }
  
  .mwrap { }
  
  .mlbl {
    color: var(--gold-bright);
    font-size: clamp(16px, 3.5vw, 28px);
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 10px;
    padding-left: 4px;
    text-shadow: 
      0 0 20px rgba(255,215,0,0.6),
      0 2px 8px rgba(0,0,0,0.5);
  }
  
  /* ═══ Calendar Grid - ALL months 6 rows ═══ */
  .cgrid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: auto repeat(6, 95px); /* Day header + 6 uniform week rows */
  }
  
  /* Day headers */
  .dh {
    background: linear-gradient(180deg, #1f4d38 0%, var(--green-hdr) 100%);
    color: #fff;
    font-size: clamp(10px, 1.8vw, 14px);
    font-weight: 700;
    text-align: center;
    padding: 6px 0;
    letter-spacing: 1.5px;
    border-right: 1px solid rgba(255,255,255,0.15);
    border-bottom: 2px solid rgba(255,255,255,0.2);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .dh:last-child { border-right: none; }
  .dh.sat { color: #ffb8b8; }
  .dh.sun { color: #ff8888; }
  
  /* ═══ Date Cells - UNIFORM 95px height ═══ */
  .dc {
    height: 12vw; min-height: 58px; max-height: 95px;
    overflow: visible;
    position: relative;
    padding: 6px 5px 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  
  /* Regular filled cell */
  .dc.fil {
    background: transparent;
    border-right: 1px solid rgba(255,255,255,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .dc.fil:nth-child(7n) { border-right: none; }
  
  /* Empty — transparent */
  .dc.emp {
    background: transparent;
    border: none;
  }
  
  /* Event cell */
  .dc.evt {
    background: linear-gradient(160deg, 
      rgba(15,40,120,0.94) 0%, 
      rgba(8,25,85,0.94) 50%,
      rgba(10,30,95,0.94) 100%);
    border: 1.5px solid var(--evt-bd) !important;
    box-shadow: 
      0 0 16px rgba(80,150,255,0.35),
      inset 0 1px 0 rgba(180,220,255,0.2),
      inset 0 -1px 0 rgba(50,100,200,0.3);
    border-radius: 4px;
  }
  
  /* Date number */
  .dn {
    font-size: 17px;
    font-weight: 900;
    color: rgba(255,255,255,0.95);
    line-height: 1;
    width: 100%;
    text-align: left;
    padding-left: 4px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    margin-bottom: 3px;
  }
  
  .dc.evt .dn {
    color: rgba(200,225,255,1);
    text-shadow: 0 0 8px rgba(150,200,255,0.6);
  }
  
  .dc.sat .dn,
  .dc.sun .dn,
  .dc.hol .dn {
    color: var(--red) !important;
    text-shadow: 0 0 8px rgba(255,92,92,0.5) !important;
  }
  
  /* ═══ Event Content ═══ */
  .ev {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 2px;
  }
  
  .vn {
    width: 100%;
    font-size: clamp(7px, 1.3vw, 10px);
    font-weight: 700;
    color: rgba(220,240,255,0.98);
    text-align: center;
    white-space: nowrap;
    overflow: visible;
    line-height: 1.35;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  
  .tm {
    font-size: clamp(8px, 1.5vw, 11px);
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    white-space: nowrap;
    letter-spacing: 1px;
    margin-top: 2px;
    text-shadow: 
      0 0 10px rgba(255,215,0,0.6),
      0 1px 3px rgba(0,0,0,0.5);
  }
</style>

(function(){

      var a=.35+rnd()*.65;
      var col=starColors[Math.floor(rnd()*starColors.length)];
      var sg=cx.createRadialGradient(x,y,0,x,y,r*4);
      sg.addColorStop(0,'rgba('+col+','+a+')');
      sg.addColorStop(.25,'rgba('+col+','+(a*.5)+')');
      sg.addColorStop(1,'transparent');
      cx.fillStyle=sg; cx.beginPath(); cx.arc(x,y,r*4,0,Math.PI*2); cx.fill();
    }

    // ── 明るい星 (25個、十字の輝き付き) ─────────────────────────────
    seed=99;
    for(var j=0;j<25;j++){
      var sx=rnd()*cv.width, sy=rnd()*cv.height*.74, sz=5+rnd()*12;
      var starCol=rnd()>.5?'255,255,255':rnd()>.5?'180,200,255':'255,250,200';
      cx.save(); cx.translate(sx,sy); cx.globalAlpha=.55+rnd()*.45;
      // コアの輝き
      var bg=cx.createRadialGradient(0,0,0,0,0,sz*4);
      bg.addColorStop(0,'rgba('+starCol+',.7)'); bg.addColorStop(.2,'rgba('+starCol+',.3)'); bg.addColorStop(1,'transparent');
      cx.fillStyle=bg; cx.beginPath(); cx.arc(0,0,sz*4,0,Math.PI*2); cx.fill();
      // 十字の光芒
      cx.strokeStyle='rgba('+starCol+',.6)'; cx.lineWidth=.7;
      for(var k=0;k<4;k++){
        cx.save(); cx.rotate(k*Math.PI/4+.2);
        cx.beginPath(); cx.moveTo(0,-sz*3.0); cx.lineTo(0,sz*3.0); cx.stroke();
        cx.restore();
      }
      cx.restore();
    }

    // ── 地平線付近の雲（シルエット） ────────────────────────────────
    for(var c=0;c<7;c++){
      var wx=cv.width*(.05+c*.14+(rnd()*.06-.03)), wy=cv.height*(.84+rnd()*.05);
      var wg=cx.createRadialGradient(wx,wy,0,wx,wy,180+rnd()*80);
      wg.addColorStop(0,'rgba(30,15,10,.55)'); wg.addColorStop(.5,'rgba(20,10,5,.25)'); wg.addColorStop(1,'transparent');
      cx.save(); cx.scale(1+rnd()*.5,.22+rnd()*.10); cx.fillStyle=wg;
      cx.beginPath(); cx.arc(wx/(1+rnd()*.5),wy/(.22+rnd()*.10),260,0,Math.PI*2); cx.fill(); cx.restore();
    }
  }
  draw(); window.addEventListener('resize',draw);
})();

function buildMonth(m) {
  const wrap = document.createElement('div');
  wrap.className = 'mwrap';

  const lbl = document.createElement('div');
  lbl.className = 'mlbl';
  lbl.textContent = m.name;
  wrap.appendChild(lbl);

  const grid = document.createElement('div');
  grid.className = 'cgrid';

  // Day headers
  ['月', '火', '水', '木', '金', '土', '日'].forEach((d, i) => {
    const th = document.createElement('div');
    th.className = 'dh' + (i === 5 ? ' sat' : i === 6 ? ' sun' : '');
    th.textContent = d;
    grid.appendChild(th);
  });

  const off = m.fw;
  const hset = new Set(m.hol);
  
  // Always create 6 weeks (42 cells) for uniform grid
  const totalCells = 42;

  for (let i = 0; i < totalCells; i++) {
    const day = i - off + 1;
    const col = i % 7;
    const dc = document.createElement('div');

    if (i < off || day > m.days) {
      dc.className = 'dc emp';
      grid.appendChild(dc);
      continue;
    }

    const isSat = col === 5;
    const isSun = col === 6;
    const isHol = hset.has(day);
    const e = m.ev[day];

    let cls = 'dc fil';
    if (isSat) cls += ' sat';
    if (isSun) cls += ' sun';
    if (isHol) cls += ' hol';
    if (e) cls += ' evt';
    dc.className = cls;

    const dn = document.createElement('div');
    dn.className = 'dn';
    dn.textContent = day;
    dc.appendChild(dn);

    if (e) {
      const ev = document.createElement('div');
      ev.className = 'ev';
      e.v.forEach(line => {
        const p = document.createElement('div');
        p.className = 'vn';
        p.textContent = line;
        ev.appendChild(p);
      });
      const t = document.createElement('div');
      t.className = 'tm';
      t.textContent = e.t;
      ev.appendChild(t);
      dc.appendChild(ev);
    }

    grid.appendChild(dc);
  }

  wrap.appendChild(grid);
  return wrap;
}

const root = document.getElementById('root');

[[0],[1],[2],[3],[4]].forEach(pair => {
  const row = document.createElement('div');

  pair.forEach(i => row.appendChild(buildMonth(MONTHS[i])));
  if (pair.length === 1) row.appendChild(document.createElement('div'));
  root.appendChild(row);
});
